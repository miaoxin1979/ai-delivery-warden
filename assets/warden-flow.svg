<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#052E2B"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#0F172A"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1200" height="520" rx="28" fill="url(#bg)"/>
  <text x="60" y="72" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800">AI Delivery Warden</text>
  <text x="60" y="108" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="18">A local quality gate for AI-generated deliveries · AI 交付监工</text>

  <g filter="url(#shadow)">
    <rect x="60" y="170" width="210" height="150" rx="18" fill="url(#card)" stroke="#334155"/>
    <text x="92" y="222" fill="#E2E8F0" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700">AI Agent</text>
    <text x="92" y="258" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">writes code</text>
    <text x="92" y="282" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="15">claims “done”</text>
  </g>

  <path d="M290 245H388" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M378 231L394 245L378 259" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="420" y="138" width="330" height="214" rx="22" fill="#082F49" stroke="#0EA5E9"/>
    <text x="458" y="190" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">Warden Checks</text>
    <text x="458" y="230" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">• project context</text>
    <text x="458" y="258" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">• acceptance criteria</text>
    <text x="458" y="286" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">• verification evidence</text>
    <text x="458" y="314" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16">• real data flow / rollback / handoff</text>
  </g>

  <path d="M770 245H868" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
  <path d="M858 231L874 245L858 259" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

  <g filter="url(#shadow)">
    <rect x="900" y="140" width="240" height="86" rx="18" fill="#064E3B" stroke="#10B981"/>
    <text x="958" y="193" fill="#ECFDF5" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">PASS</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="900" y="268" width="240" height="86" rx="18" fill="#4C0519" stroke="#FB7185"/>
    <text x="952" y="321" fill="#FFF1F2" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">BLOCK</text>
  </g>

  <path d="M1020 354C1016 420 288 420 242 324" stroke="#FB7185" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10"/>
  <text x="454" y="454" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Return prompt sends the agent back to fix the delivery · 返工口令让 AI 回去补证据</text>
</svg>
